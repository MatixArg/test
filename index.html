<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Torneo Valorant | UNLU Esports</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚔️ TORNEO VALORANT UNLU</h1>
        <button class="btn-admin" onclick="abrirModalAdmin()">👑 ADMIN</button>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" id="tabSolo">🎮 JUGADOR SOLO</button>
            <button class="tab-btn" id="tabEquipo">👥 EQUIPO (5)</button>
        </div>

        <!-- FORMULARIO SOLO -->
        <div id="formSolo">
            <div class="form-group">
                <label>🎯 RIOT ID (Nombre#Tag)</label>
                <input type="text" id="soloRiotId" placeholder="Ej: TenZ#1234">
            </div>
            <div class="form-group">
                <label>📊 RANGO ACTUAL</label>
                <select id="soloRango">
                    <option value="">Selecciona tu rango</option>
                    <option>Hierro</option><option>Bronce</option><option>Plata</option>
                    <option>Oro</option><option>Platino</option><option>Diamante</option>
                    <option>Ascendente</option><option>Inmortal</option><option>Radiante</option>
                </select>
            </div>
            <div class="form-group">
                <label>⚡ ROL PREFERIDO</label>
                <select id="soloRol">
                    <option value="">Selecciona tu rol</option>
                    <option>Duelista</option><option>Controlador</option>
                    <option>Centinela</option><option>Iniciador</option>
                    <option>Flex (cualquiera)</option>
                </select>
            </div>
            <button class="btn-register" onclick="registrarSolo()">✅ INSCRIBIRME COMO SOLO</button>
            <div id="msgSolo" class="success-msg"></div>
        </div>

        <!-- FORMULARIO EQUIPO -->
        <div id="formEquipo" class="hidden">
            <div class="form-group">
                <label>🏷️ NOMBRE DEL EQUIPO</label>
                <input type="text" id="nombreEquipo" placeholder="Ej: Los Tryhards">
            </div>
            <div class="form-group">
                <label>👑 CAPITÁN (RIOT ID)</label>
                <input type="text" id="capitanId" placeholder="Ej: Capitan#LAN">
            </div>
            <div class="team-grid">
                <div><label>🎮 Jugador 2</label><input type="text" id="p2" placeholder="RIOT ID"></div>
                <div><label>🎮 Jugador 3</label><input type="text" id="p3" placeholder="RIOT ID"></div>
                <div><label>🎮 Jugador 4</label><input type="text" id="p4" placeholder="RIOT ID"></div>
                <div><label>🎮 Jugador 5</label><input type="text" id="p5" placeholder="RIOT ID"></div>
            </div>
            <button class="btn-register" onclick="registrarEquipo()">✅ INSCRIBIR EQUIPO</button>
            <div id="msgEquipo" class="success-msg"></div>
        </div>
    </div>
</div>

<!-- MODAL ADMIN -->
<div id="modalAdmin" class="modal hidden">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModalAdmin()">&times;</span>
        <h2>🔐 ACCESO ADMINISTRADOR</h2>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="adminUser" placeholder="Usuario">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="adminPass" placeholder="Contraseña">
        </div>
        <div class="modal-buttons">
            <button class="btn-login" onclick="loginAdmin()">ENTRAR</button>
            <button class="btn-cancel" onclick="cerrarModalAdmin()">CANCELAR</button>
        </div>
        <div id="adminError" class="error-msg"></div>
    </div>
</div>

<!-- PANEL ADMIN (se muestra después de login) -->
<div id="panelAdminGlobal" class="hidden">
    <div class="card" style="margin-top: 30px;">
        <h2>👑 PANEL DE ADMINISTRACIÓN</h2>
        <div class="admin-actions">
            <button onclick="exportarDatos()">📋 EXPORTAR JSON</button>
            <button onclick="limpiarBase()" style="background:#ff4655;">🗑️ LIMPIAR TODO</button>
            <button onclick="cerrarSesionAdmin()">🚪 CERRAR SESIÓN</button>
        </div>

        <div class="admin-panel">
            <h3>🎮 JUGADORES SOLO</h3>
            <table id="tablaSolo">
                <thead><tr><th>Riot ID</th><th>Rango</th><th>Rol</th><th>Fecha</th><th></th></tr></thead>
                <tbody></tbody>
            </table>

            <h3>👥 EQUIPOS REGISTRADOS</h3>
            <table id="tablaEquipo">
                <thead><tr><th>Equipo</th><th>Capitán</th><th>Jugadores</th><th>Fecha</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
