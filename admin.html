<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Torneo Valorant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>👑 Panel Admin - Torneo Valorant</h1>
        <button class="btn-volver" onclick="window.location.href='index.html'">← Volver al Torneo</button>
    </div>

    <div id="loginPanel">
        <div class="login-box">
            <h2>🔐 Acceso Administrador</h2>
            <input type="text" id="adminUser" placeholder="Usuario">
            <input type="password" id="adminPass" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <div id="errorMsg" style="color:#ff4655; margin-top:10px;"></div>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="admin-actions">
            <button onclick="exportarDatos()">📋 Exportar JSON</button>
            <button onclick="limpiarBase()" style="background:#ff4655;">🗑️ Limpiar Todo</button>
            <button onclick="logout()">🚪 Cerrar Sesión</button>
        </div>

        <h3>🎮 Jugadores Solo</h3>
        <table id="tablaSolo">
            <thead><tr><th>Riot ID</th><th>Rango</th><th>Rol</th><th>Fecha</th><th></th></tr></thead>
            <tbody></tbody>
        </table>

        <h3>👥 Equipos</h3>
        <table id="tablaEquipo">
            <thead><tr><th>Equipo</th><th>Capitán</th><th>Jugadores</th><th>Fecha</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
